name: 기능 작업
description: 새 기능, 문서 작업, 발표/보고서 작업을 등록합니다.
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 작업으로 무엇을 완성할지 적어 주세요.
      placeholder: 예) 신입생 질문을 입력하면 RAG 답변과 출처를 보여준다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 수정할 화면, API, 문서, 테스트 범위를 적어 주세요.
      placeholder: 예) backend/app/rag, frontend/src, docs/llm/usage-log.md
    validations:
      required: true
  - type: textarea
    id: llm
    attributes:
      label: LLM 활용 계획
      description: LLM을 어떤 목적으로 사용할지 적어 주세요.
      placeholder: 예) 설계 검토, 테스트 케이스 아이디어, 오류 원인 분석
    validations:
      required: false
  - type: checkboxes
    id: done
    attributes:
      label: 완료 기준
      options:
        - label: 기능이 로컬에서 실행된다.
        - label: 관련 문서가 갱신되었다.
        - label: LLM 활용 기록이 갱신되었다.
        - label: 발표에서 설명할 수 있다.

